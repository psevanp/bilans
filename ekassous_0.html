<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Eline — Temps de travail</title><style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;padding:10px;background:#fff}
.header-titre{background:#5B2D8E;color:#fff;font-size:14px;font-weight:700;
  padding:9px 14px;border-radius:10px 10px 0 0;text-align:center}
.header-liens{background:#8462B3;padding:5px 14px;border-radius:0 0 10px 10px;
  display:flex;justify-content:space-around;margin-bottom:12px}
.header-liens a{color:#fff;text-decoration:none;font-size:12px;font-weight:600}
.locked{color:rgba(255,255,255,0.4);font-size:12px;font-weight:600;
  display:flex;align-items:center;gap:4px}
table{border-collapse:separate;border-spacing:3px;width:100%;font-size:12px}
th{background:#EEEDF8;color:#3C3489;padding:5px 7px;text-align:center;
  border-radius:6px;font-weight:700;white-space:nowrap}
th.label{min-width:160px;width:160px;background:transparent}
td.label{padding:6px 8px;font-weight:700;font-size:11px;text-transform:uppercase;
  letter-spacing:.04em;white-space:nowrap}
td.entr-label{color:#1a6e3c}
td.eval-label{color:#1e40af}
td.cell{padding:4px;text-align:center;border-radius:7px}
td.entr-cell{background:#F0FAF4}
td.eval-cell{background:#EEF2FF}
.gap{height:3px}
.temps-wrap{border-radius:10px;overflow:hidden;border:1.5px solid #2F5D0E;margin-bottom:10px}
.temps-titre{background:#2F5D0E;color:#fff;font-size:13px;font-weight:700;
  padding:8px 14px;text-align:center;letter-spacing:.03em}
.temps-body{background:#f6fbf2;padding:8px 10px}
.temps-cols{display:flex;gap:8px}
.temps-col{flex:1;background:#fff;border-radius:7px;padding:8px 10px;
  border:1px solid #d4edc1;display:flex;flex-direction:column;gap:3px;align-items:center;text-align:center}
.temps-col-label{font-size:11px;font-weight:700;color:#2F5D0E;text-transform:uppercase;letter-spacing:.04em}
.temps-col-date{font-size:11px;color:#777}
.temps-val{font-size:15px;font-weight:700;margin:3px 0}
.temps-com{font-size:11px;color:#666;font-style:italic}
.temps-note{font-size:10px;color:#aaa;margin-top:3px}
.val-ok{color:#2F5D0E}
.val-bad{color:#D64545}
.val-mid{color:#F2A93B}
</style></head><body><div class="temps-wrap"><div class="temps-titre">⏱ Temps de travail à la maison</div><div class="temps-body"><div class="temps-cols"><div class="temps-col"><div class="temps-col-label">Semaine précédente</div><div class="temps-col-date">du 25 mai</div><div class="temps-val val-bad">9 min</div><div class="temps-com">insuffisant</div></div><div class="temps-col"><div class="temps-col-label">Semaine en cours</div><div class="temps-col-date">du 1 juin</div><div class="temps-val val-bad">30 min</div><div class="temps-com">insuffisant</div><span class="temps-note">mis à jour le 7 juin 2026 à 22:19</span></div></div></div></div></body></html>
